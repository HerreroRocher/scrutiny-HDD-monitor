version: 1

host:
  id: "raspberrypi"

# Uses the kernel path /dev/sdb, not the /dev/disk/by-id/... symlink, because
# Scrutiny's YAML parser silently lowercases the `device:` value. The WD's
# by-id symlink contains uppercase letters (WDC, WXC1A...) so the lowercased
# path fails to open → smartctl exit 2 → Scrutiny drops the device.
# See CLAUDE.md for the full diagnosis. Single-drive Pi, so /dev/sdb is
# stable enough; if a second USB disk is ever added, reassess.
allow_listed_devices:
  - /dev/sdb

devices:
  - device: /dev/sdb
    # USB bridge is Realtek 0x0bda:0x9201 — smartctl needs -d sat to talk to it.
    type: 'sat'
    commands:
      # metrics_info_args does NOT get -n standby. Verified 2026-07-05 that
      # `smartctl --info --json -d sat` on this drive returns full device info
      # while the drive is in standby, without spinning it up — the controller
      # answers IDENTIFY DEVICE from cache. Adding -n standby here breaks the
      # first-run device registration (exit 2 → no UUID → whole device skipped).
      metrics_info_args:  '--info --json'
      # metrics_smart_args DOES get -n standby. `--xall` reads live SMART
      # attributes from the drive, which would otherwise force a spinup.
      # smartctl exits 2 when standby, Scrutiny logs a skip and the dashboard
      # retains last-known values until the drive is naturally awake.
      metrics_smart_args: '--xall --json -n standby'
